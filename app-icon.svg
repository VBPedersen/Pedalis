<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <!-- Linear Gradient for a premium metallic faceplate -->
    <defs>
        <linearGradient id="pedalBody" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2e2e33" />
            <stop offset="100%" stop-color="#1b1b1f" />
        </linearGradient>
        <linearGradient id="neonGreen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#34d399" />
            <stop offset="100%" stop-color="#059669" />
        </linearGradient>
    </defs>

    <!-- 1. Main Heavy Metal Pedal Enclosure (Stretched close to edges to match WebStorm/Firefox size) -->
    <rect x="20" y="20" width="472" height="472" rx="56" fill="url(#pedalBody)" stroke="#4b5563" stroke-width="16"/>

    <!-- 2. The Circuit Board Letter "P" Design (BUMPED to ultra-thick stroke width="32") -->
    <!-- Vertical Signal Spine -->
    <path d="M170 300 V150" stroke="url(#neonGreen)" stroke-width="32" stroke-linecap="round"/>

    <!-- 3. Giant Mechanical Stomp Footswitch (Scaled way up so it doesn't turn into a dot) -->
    <!-- Outer Steel Casing Washer -->
    <circle cx="256" cy="276" r="148" fill="#4b5563" stroke="#9ca3af" stroke-width="8" />
    <!-- Center Plunger Contact Button -->
    <circle cx="256" cy="276" r="86" fill="#d1d5db" />

    <!-- 4. Over-the-Top Glowing Status LED (Thick, bright neon indicator at the top) -->
    <circle cx="256" cy="72" r="18" fill="#10b981" filter="drop-shadow(0px 0px 14px #34d399)"/>
</svg>
